# Version should match the Git tag (e.g. v0.1.0) when releasing.
# Build with: conda build conda/
{% set version = "0.1.0" %}

package:
  name: swift-host-subtraction
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  script: pip install . --no-deps --ignore-installed

requirements:
  build:
    - python
    - pip
    - setuptools-scm
  host:
    - python
  run:
    - python >=3.9
    - numpy >=1.12.0
    - matplotlib
    - astropy >=1.1.1

test:
  imports:
    - SwiftPhotom

about:
  home: https://github.com/gterreran/Swift_host_subtraction
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: "UVOT image-subtracted photometry via HEASoft (Swift Observatory)"
