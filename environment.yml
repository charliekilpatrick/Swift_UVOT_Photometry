# Conda environment for Swift UVOT Photometry and HEASoft.
#
#   conda env create -f environment.yml
#   conda activate swift-photom
#   bash setup_caldb.sh   # one-time: installs CALDB config into $CONDA_PREFIX/caldb
#
# CALDB is not shipped with the heasoft conda package. The setup_caldb.sh script
# downloads CALDB setup files from HEASARC so uvotmaghist etc. can access
# calibration data (remote access by default). After running it, set CALDB,
# CALDBCONFIG, and CALDBALIAS as printed (or add to your shell profile).
#
# After each activate, initialize HEASoft (and CALDB if not in profile):
#   source $CONDA_PREFIX/headas-init.sh
#   export CALDB=$CONDA_PREFIX/caldb
#   export CALDBCONFIG=$CALDB/software/tools/caldb.config
#   export CALDBALIAS=$CALDB/software/tools/alias_config.fits
#
# HEASoft is provided by HEASARC's conda channel (6.35+).

name: swift-photom
channels:
  - https://heasarc.gsfc.nasa.gov/FTP/software/conda/
  - conda-forge
  - defaults
dependencies:
  - python >=3.11
  - pip
  - numpy
  - matplotlib
  - astropy
  - astroquery
  - heasoft  # Swift/UVOT tools (uvotmaghist, uvotimsum, fcopy, fappend, etc.)
  - pip:
    - .   # install this package in editable form
